<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RK Bill Desk</title>
    
    <!-- PWA & Apple Standalone Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RK Bill Desk" />
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1629909613654-28e377c37b09?w=192&h=192&fit=crop&q=80" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((reg) => console.log("[PWA] Service Worker registered successfully:", reg.scope))
            .catch((err) => console.error("[PWA] Service Worker registration failed:", err));
        });
      }
    </script>
  </body>
</html>
